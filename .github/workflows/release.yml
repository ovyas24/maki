name: Release

# Push a tag like `v0.1.0` to cut a release. The job builds the deb, rpm, and
# AppImage bundles plus a portable binary tarball and attaches them all to a
# GitHub Release created from the tag, using the matching CHANGELOG section as
# the release notes. Tags with a suffix (e.g. `v0.2.0-rc1`) are marked as
# pre-releases.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile

      - name: Derive version and pre-release flag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        run: |
          awk -v ver="${{ steps.meta.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" { on=1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > "${RUNNER_TEMP}/release-notes.md"
          echo "----- release notes -----"
          cat "${RUNNER_TEMP}/release-notes.md"

      # Builds the frontend + release binary, bundles deb/rpm/appimage (from
      # tauri.conf.json), creates the GitHub Release for this tag, and uploads
      # every bundle to it automatically.
      - name: Build bundles and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Maki ${{ github.ref_name }}"
          releaseBodyFile: ${{ runner.temp }}/release-notes.md
          releaseDraft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}

      - name: Stage portable binary tarball
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          STAGE="maki-${VERSION}-linux-x86_64"
          mkdir -p "${RUNNER_TEMP}/${STAGE}"
          cp src-tauri/target/release/maki "${RUNNER_TEMP}/${STAGE}/"
          cp packaging/maki.desktop LICENSE README.md "${RUNNER_TEMP}/${STAGE}/"
          cp -r src-tauri/icons "${RUNNER_TEMP}/${STAGE}/icons"
          tar -C "${RUNNER_TEMP}" -czf "${RUNNER_TEMP}/${STAGE}.tar.gz" "${STAGE}"

      - name: Attach tarball to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${RUNNER_TEMP}/maki-${{ steps.meta.outputs.version }}-linux-x86_64.tar.gz" \
            --clobber
